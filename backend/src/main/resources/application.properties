# 服务端口
server.port=8080

# 应用名称
spring.application.name=webpage-backend

# JSON 序列化配置：不序列化 null 值的字段
spring.jackson.default-property-inclusion=non_null

# ===== 数据库配置（MySQL） =====
# MySQL 驱动
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 数据库连接地址：localhost=本机，3306=MySQL默认端口，webpage=数据库名
# ?useSSL=false 关闭SSL（本地开发不需要），serverTimezone=Asia/Shanghai 设置时区
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/webpage?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
# MySQL 用户名和密码：服务器部署时通过环境变量 DB_USERNAME / DB_PASSWORD 覆盖
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Root@123456}

# JPA / Hibernate 配置
# ddl-auto 控制建表策略：
#   update  — 每次启动自动根据 Entity 类更新表结构（不会删已有数据）
#   create  — 每次启动重建表（数据会丢！仅用于测试）
#   create-drop — 启动建表，关闭删表
#   validate — 只校验表结构是否匹配，不做修改
spring.jpa.hibernate.ddl-auto=update

# 在控制台打印 SQL 语句，方便学习观察框架生成了什么 SQL
spring.jpa.show-sql=true

# SQL 格式化输出，更易读
spring.jpa.properties.hibernate.format_sql=true

# MySQL 方言（告诉 Hibernate 用 MySQL 的 SQL 语法）
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5InnoDBDialect

# 初始化数据：Spring Boot 启动时自动执行 classpath 下的 data.sql
# 注意：Spring Boot 2.5+ 改用 spring.sql.init.mode 替代旧的 initialization-mode
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# 文章正文图片上传
# backend 目录下的 uploads/images 会映射为 http://localhost:8080/uploads/images/**
app.upload.image-dir=uploads/images
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# 后台编辑的个人资料会保存到 backend/data/profile.json
app.profile.data-file=data/profile.json
